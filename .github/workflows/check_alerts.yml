name: Chequear Alertas de Acciones

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Descargar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install requests

      - name: 🔔 Chequear alertas
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python check_alerts.py

      - name: 💾 Guardar estado de alertas
        run: |
          git config user.name "AlertasBot"
          git config user.email "bot@alertas.com"
          git add alerts.json
          git diff --staged --quiet || git commit -m "🔔 Actualizar estado de alertas"
          git push
