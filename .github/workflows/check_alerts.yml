name: Chequear Alertas de Acciones

on:
  schedule:
    - cron: '* * * * *'   # cada minuto
  workflow_dispatch:

# Solo un workflow corre a la vez — si hay otro en curso, espera
concurrency:
  group: alertas-bot
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Descargar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install requests tzdata

      - name: 🔔 Leer comandos y chequear alertas
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python check_alerts.py

      - name: 💾 Guardar estado
        run: |
          git config user.name "AlertasBot"
          git config user.email "bot@alertas.com"
          git add alerts.json tg_offset.txt last_run.txt || true
          git diff --staged --quiet || git commit -m "🔔 Actualizar alertas"
          git pull --rebase origin main
          git push
